name: Publish Convention Release

on:
  push:
    tags:
      - 'convention-v**'

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.repository == 'alexanderrotela20/rotalex-root-conventions'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Set version from properties
        run: |
          VERSION=$(grep 'VERSION_NAME=' convention/gradle.properties | cut -d'=' -f2)
          echo "ORG_GRADLE_PROJECT_VERSION_NAME=$VERSION" >> $GITHUB_ENV

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Build Convention
        run: ./gradlew :convention:build

      - name: Publish Convention
        run: ./gradlew :convention:publishToMavenCentral
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
